<section class="gallery">
  <h2>Gallery</h2>

  <div class="gallery-container">
    <!-- Previous Button -->
    <button mat-icon-button class="nav-btn left" (click)="prev()">
      <mat-icon>chevron_left</mat-icon>
    </button>

    <!-- Display Photo or Video -->
    <div class="gallery-item">
      <img
        *ngIf="items[currentIndex].type === 'photo'"
        [src]="items[currentIndex].src"
        alt="Gallery photo"
      />
      <video
        *ngIf="items[currentIndex].type === 'video'"
        [src]="items[currentIndex].src"
        controls
      ></video>
    </div>

    <!-- Next Button -->
    <button mat-icon-button class="nav-btn right" (click)="next()">
      <mat-icon>chevron_right</mat-icon>
    </button>
  </div>
</section>
